<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Amiri:ital@0;1&amp;display=swap" rel="stylesheet">
<style>
  html, body { margin:0; padding:0; background:#000000; }
  a { color:#F0F0FA; }
  a:hover { color:#FFFFFF; }
  @keyframes mnRise { from { transform: translateY(112%); } to { transform: translateY(0); } }
  @keyframes mnUp { from { opacity:0; transform: translateY(16px); } to { opacity:1; transform: translateY(0); } }
  @keyframes mnTrack { from { opacity:0; letter-spacing:.34em; } to { opacity:1; letter-spacing:.16em; } }
  @keyframes mnLine { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  @keyframes mnFade { from { opacity:0; } to { opacity:1; } }
</style>
</helmet>

<header id="top" data-screen-label="Hero" style="position:relative;min-height:100svh;background:#000000;color:#F0F0FA;overflow:hidden;display:flex;align-items:center;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased">

  <canvas ref="{{ setCanvas }}" style="position:absolute;inset:0;width:100%;height:100%;z-index:0;animation:mnFade 1.6s ease .25s both" aria-hidden="true"></canvas>

  <div style="position:absolute;inset:0;z-index:1;pointer-events:none;background:radial-gradient(ellipse 90% 70% at 28% 55%, rgba(0,0,0,.42) 0%, transparent 62%)"></div>

  <div style="position:relative;z-index:2;width:100%;max-width:1200px;margin:0 auto;padding:96px clamp(20px,5vw,64px) 120px">
    <div style="max-width:720px">

      <div style="display:flex;align-items:center;gap:14px;margin-bottom:clamp(26px,3vw,38px)">
        <span style="display:block;width:44px;height:1px;background:rgba(240,240,250,.4);transform-origin:left center;animation:mnLine 1s cubic-bezier(.2,.7,.2,1) .45s both"></span>
        <span style="font-size:13px;letter-spacing:.16em;text-transform:uppercase;color:rgba(240,240,250,.55);animation:mnTrack 1.3s cubic-bezier(.2,.7,.2,1) .55s both">Sovereign intelligence</span>
      </div>

      <h1 style="font-weight:700;font-size:clamp(38px,5vw,64px);line-height:1.05;letter-spacing:-.032em;color:#FFFFFF;margin:0">
        <span style="display:block;overflow:hidden;padding-bottom:.07em"><span style="display:block;animation:mnRise 1.1s cubic-bezier(.16,.82,.24,1) .7s both">Not the AI that</span></span>
        <span style="display:block;overflow:hidden;padding-bottom:.07em"><span style="display:block;animation:mnRise 1.1s cubic-bezier(.16,.82,.24,1) .84s both">knows the world.</span></span>
        <span style="display:block;overflow:hidden;padding-bottom:.07em"><span style="display:block;color:rgba(240,240,250,.5);animation:mnRise 1.1s cubic-bezier(.16,.82,.24,1) 1s both">The AI that knows yours.</span></span>
      </h1>

      <p style="margin:clamp(26px,3vw,34px) 0 0;max-width:46ch;font-size:16px;line-height:1.65;color:rgba(240,240,250,.62);animation:mnUp 1.1s cubic-bezier(.2,.7,.2,1) 1.35s both">Trained on your domain. Running on hardware you own. Growing sharper every day it operates.</p>

      <div style="margin-top:clamp(34px,4vw,46px);display:flex;align-items:center;gap:28px;flex-wrap:wrap;animation:mnUp 1.1s cubic-bezier(.2,.7,.2,1) 1.6s both">
        <a href="#industries" style="font-size:13px;letter-spacing:.1em;text-transform:uppercase;text-decoration:none;color:#F0F0FA;background:transparent;border:1px solid rgba(240,240,250,.32);border-radius:2px;padding:15px 30px;transition:background .3s ease,border-color .3s ease" style-hover="background:rgba(240,240,250,.08);border-color:rgba(240,240,250,.55)">Explore the intelligence</a>
        <a href="#thesis" style="font-size:13px;letter-spacing:.08em;text-transform:uppercase;text-decoration:none;color:rgba(240,240,250,.6);border-bottom:1px solid rgba(240,240,250,.25);padding-bottom:5px;transition:color .3s,border-color .3s" style-hover="color:#FFFFFF;border-color:rgba(240,240,250,.6)">The thesis →</a>
      </div>

    </div>
  </div>

  <div style="position:absolute;left:0;right:0;bottom:0;z-index:2;background:rgba(0,0,0,.45);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid rgba(240,240,250,.12)">
    <div style="max-width:1200px;margin:0 auto;padding:16px clamp(20px,5vw,64px);display:flex;gap:clamp(18px,4vw,44px);align-items:center;flex-wrap:wrap;font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:rgba(240,240,250,.45);animation:mnUp 1.2s cubic-bezier(.2,.7,.2,1) 2s both">
      <span>Offline</span>
      <span>On your hardware</span>
      <span>Seventeen registered models</span>
      <span style="margin-left:auto;font-family:'Amiri',serif;font-size:16px;letter-spacing:0;text-transform:none;color:rgba(240,240,250,.5)" dir="rtl">منارة في الظلام</span>
    </div>
  </div>

</header>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;sweepSeconds&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 14, &quot;min&quot;: 6, &quot;max&quot;: 30, &quot;step&quot;: 1, &quot;unit&quot;: &quot;s&quot;, &quot;section&quot;: &quot;Beacon&quot; },
  &quot;showConstellations&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;section&quot;: &quot;Beacon&quot; },
  &quot;starCount&quot;: { &quot;editor&quot;: &quot;range&quot;, &quot;default&quot;: 180, &quot;min&quot;: 60, &quot;max&quot;: 320, &quot;step&quot;: 20, &quot;section&quot;: &quot;Starfield&quot; }
}">
class Component extends DCLogic {

  setCanvas = (el) => {
    if (el && el !== this.cvs) { this.cvs = el; this.start(); }
  };

  renderVals() {
    return { setCanvas: this.setCanvas };
  }

  componentWillUnmount() {
    cancelAnimationFrame(this.RAF);
    window.removeEventListener('resize', this.onResize);
    window.removeEventListener('mousemove', this.onMouse);
  }

  start() {
    const cvs = this.cvs;
    const ctx = cvs.getContext('2d');
    let W = 0, H = 0, DPR = 1;
    let stars = [];
    let t = 0;
    let mx = 0, my = 0, smx = 0, smy = 0;   // mouse parallax (smoothed)
    const self = this;

    // beacon origin (set on resize)
    let ox = 0, oy = 0;

    this.onResize = () => {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      const host = cvs.parentElement;
      W = host.offsetWidth || window.innerWidth;
      H = host.offsetHeight || window.innerHeight;
      cvs.width = W * DPR;
      cvs.height = H * DPR;
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      ox = W * 0.80;
      oy = H * 0.34;
      init();
    };

    this.onMouse = (e) => {
      mx = (e.clientX / window.innerWidth - 0.5);
      my = (e.clientY / window.innerHeight - 0.5);
    };

    function init() {
      const target = self.props.starCount ?? 180;
      const count = W < 768 ? Math.round(target * 0.45) : target;
      stars = [];
      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          vx: (Math.random() - 0.5) * 0.05,
          vy: (Math.random() - 0.5) * 0.05,
          phase: Math.random() * Math.PI * 2,
          speed: 0.15 + Math.random() * 0.35,
          base: 0.10 + Math.random() * 0.22,
          r: 0.5 + Math.random() * 0.9,
          depth: 0.4 + Math.random() * 0.6,   // parallax depth
          e: 0                                 // beam energy (wake)
        });
      }
    }

    function angDiff(a, b) {
      let d = a - b;
      while (d > Math.PI) d -= Math.PI * 2;
      while (d < -Math.PI) d += Math.PI * 2;
      return d;
    }

    function draw() {
      ctx.clearRect(0, 0, W, H);
      t += 1 / 60;

      // smooth mouse
      smx += (mx - smx) * 0.04;
      smy += (my - smy) * 0.04;

      const period = self.props.sweepSeconds ?? 14;
      const th = ((t - 1.2) / period) * Math.PI * 2 - Math.PI * 0.75; // beam angle
      const beamHalf = 0.10;                                          // wedge half-width (rad)
      const ramp = Math.max(0, Math.min(1, (t - 1.6) / 2.5));        // beam fades in after text

      // ── beam wedge (very faint, drawn behind everything) ──
      if (ramp > 0.01) {
        const R = Math.hypot(W, H);
        const grad = ctx.createRadialGradient(ox, oy, 0, ox, oy, R * 0.9);
        grad.addColorStop(0, 'rgba(240,240,250,' + (0.055 * ramp) + ')');
        grad.addColorStop(0.55, 'rgba(240,240,250,' + (0.022 * ramp) + ')');
        grad.addColorStop(1, 'rgba(240,240,250,0)');
        ctx.beginPath();
        ctx.moveTo(ox, oy);
        ctx.arc(ox, oy, R, th - beamHalf, th + beamHalf);
        ctx.closePath();
        ctx.fillStyle = grad;
        ctx.fill();

        // beacon core
        const pulse = 0.7 + Math.sin(t * 2.2) * 0.3;
        ctx.save();
        ctx.shadowBlur = 22;
        ctx.shadowColor = 'rgba(240,240,250,' + (0.5 * ramp * pulse) + ')';
        ctx.beginPath();
        ctx.arc(ox, oy, 1.6, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255,255,255,' + (0.85 * ramp) + ')';
        ctx.fill();
        ctx.restore();
      }

      // ── update stars: beam energy + drift + twinkle ──
      for (const s of stars) {
        const px = s.x + smx * 26 * s.depth;
        const py = s.y + smy * 26 * s.depth;
        const ang = Math.atan2(py - oy, px - ox);
        if (ramp > 0.01 && Math.abs(angDiff(ang, th)) < beamHalf * 1.6) s.e = 1;
        s.e *= 0.988; // wake decay ~1.4s
        if (s.e < 0.004) s.e = 0;

        s.x += s.vx; s.y += s.vy;
        if (s.x < -5) s.x = W + 5; if (s.x > W + 5) s.x = -5;
        if (s.y < -5) s.y = H + 5; if (s.y > H + 5) s.y = -5;
      }

      // ── constellation lines inside the beam's wake ──
      if (self.props.showConstellations ?? true) {
        const DIST = W < 768 ? 100 : 140;
        for (let i = 0; i < stars.length; i++) {
          const a = stars[i];
          if (a.e < 0.12) continue;
          for (let j = i + 1; j < stars.length; j++) {
            const b = stars[j];
            if (b.e < 0.12) continue;
            const dx = a.x - b.x, dy = a.y - b.y;
            const d2 = dx * dx + dy * dy;
            if (d2 < DIST * DIST) {
              const d = Math.sqrt(d2);
              const alpha = (1 - d / DIST) * 0.14 * Math.min(a.e, b.e);
              ctx.beginPath();
              ctx.strokeStyle = 'rgba(240,240,250,' + alpha + ')';
              ctx.lineWidth = 0.5;
              ctx.moveTo(a.x + smx * 26 * a.depth, a.y + smy * 26 * a.depth);
              ctx.lineTo(b.x + smx * 26 * b.depth, b.y + smy * 26 * b.depth);
              ctx.stroke();
            }
          }
        }
      }

      // ── stars ──
      for (const s of stars) {
        const twinkle = Math.sin(t * s.speed * 3 + s.phase) * 0.08;
        let alpha = s.base + twinkle + s.e * 0.6;
        if (alpha < 0.03) alpha = 0.03;
        if (alpha > 0.95) alpha = 0.95;

        const px = s.x + smx * 26 * s.depth;
        const py = s.y + smy * 26 * s.depth;
        const r = s.r + s.e * 0.5;

        if (s.e > 0.05) {
          ctx.save();
          ctx.shadowBlur = 8 * s.e + 3;
          ctx.shadowColor = 'rgba(240,240,250,' + (alpha * 0.7) + ')';
          ctx.beginPath();
          ctx.arc(px, py, r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(240,240,250,' + alpha + ')';
          ctx.fill();
          ctx.restore();
        } else {
          ctx.beginPath();
          ctx.arc(px, py, r, 0, Math.PI * 2);
          ctx.fillStyle = 'rgba(240,240,250,' + alpha + ')';
          ctx.fill();
        }
      }

      self.RAF = requestAnimationFrame(draw);
    }

    this.onResize();
    window.addEventListener('resize', this.onResize);
    window.addEventListener('mousemove', this.onMouse);
    cancelAnimationFrame(this.RAF);
    draw();
  }
}
</script>
</body>
</html>
