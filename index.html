document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
        const doc = new DOMParser().parseFromString(template, 'text/html');
    // Capture thumbnail HTML before swap so we can re-inject into new doc for a smooth fade
    const thumbEl = document.getElementById('__bundler_thumbnail');
    const thumbHTML = thumbEl ? thumbEl.outerHTML : '';
    document.documentElement.replaceWith(doc.documentElement);
    // Re-inject thumbnail into new document and fade it out
    if (thumbHTML) {
      const wrap = document.createElement('div');
      wrap.innerHTML = thumbHTML;
      const th = wrap.firstElementChild;
      if (th) {
        th.style.cssText += ';transition:opacity 0.5s ease;pointer-events:none';
        document.body.prepend(th);
        requestAnimationFrame(() => requestAnimationFrame(() => {
          th.style.opacity = '0';
          setTimeout(() => { try { th.remove(); } catch(e){} }, 500);
        }));
      }
    }
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-serif;font-size:15px;line-height:1.55;letter-spacing:-.006em;color:#16130D;outline:none;min-height:104px;resize:vertical;transition:border-color .25s,box-shadow .25s\" style-focus=\"border-color:#A6884E;box-shadow:0 0 0 3px rgba(166,136,78,.13)\"><\u002Ftextarea>\n          <\u002Flabel>\n          <sc-if value=\"{{ cError }}\" hint-placeholder-val=\"\">\n            <div style=\"display:flex;gap:9px;align-items:center;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.02em;color:#9A5B3F\">\n              <span style=\"width:5px;height:5px;border-radius:50%;background:#9A5B3F;flex:0 0 auto\"><\u002Fspan>{{ cError }}\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <button type=\"submit\" style=\"margin-top:4px;width:100%;font-family:'Geist Mono',monospace;font-size:12.5px;letter-spacing:.06em;text-transform:uppercase;color:#F1EEE6;background:#0C0A07;border:0;border-radius:999px;padding:16px;cursor:pointer;transition:transform .3s ease,box-shadow .3s ease\" style-hover=\"transform:translateY(-2px);box-shadow:0 16px 34px -16px rgba(12,10,7,.5)\">Send inquiry →<\u002Fbutton>\n          <p style=\"font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.04em;color:#A8A091;text-align:center;line-height:1.6\">Your details stay with Manar. No data leaves, on the website or on your ground.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n      <sc-if value=\"{{ cSubmitted }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"text-align:center;padding:clamp(18px,4vw,40px) clamp(6px,2vw,18px)\">\n          <span style=\"display:inline-block;width:11px;height:11px;border-radius:50%;background:#C8A968;margin-bottom:24px\"><\u002Fspan>\n          <h3 style=\"font-family:'Geist',sans-serif;font-weight:600;font-size:clamp(22px,2.4vw,28px);line-height:1.16;letter-spacing:-.024em;color:#16130D\">Your inquiry is on its ground.<\u002Fh3>\n          <p style=\"margin:14px auto 0;max-width:38ch;font-size:15px;line-height:1.6;color:#59544A\">Thank you, {{ cName }}. We have your message and will be in touch within two working days.<\u002Fp>\n          <button onclick=\"{{ onContactReset }}\" type=\"button\" style=\"margin-top:26px;font-family:'Geist Mono',monospace;font-size:11.5px;letter-spacing:.06em;text-transform:uppercase;color:#16130D;background:none;border:1px solid rgba(22,19,13,.2);border-radius:999px;padding:12px 24px;cursor:pointer;transition:border-color .3s,color .3s\" style-hover=\"border-color:#A6884E;color:#A6884E\">Send another →<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fform>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ===================== HERO ===================== -->\n<header id=\"top\" style=\"position:relative;min-height:100svh;background:#0C0A07;color:#F1EEE6;overflow:hidden;display:flex;align-items:center\">\n  <!-- beacon: a sweeping light reveals a neural field sleeping in the dark (canvas) -->\n  <canvas data-hero-canvas=\"\" style=\"position:absolute;inset:0;z-index:0;width:100%;height:100%;pointer-events:none;display:{{ beaconDisplay }}\"><\u002Fcanvas>\n  <!-- veil keeps headline column clean -->\n  <div style=\"position:absolute;inset:0;z-index:1;pointer-events:none;background:linear-gradient(96deg,rgba(12,10,7,.94) 0%,rgba(12,10,7,.62) 42%,rgba(12,10,7,.08) 78%),linear-gradient(0deg,rgba(12,10,7,.7) 0%,rgba(12,10,7,0) 26%)\"><\u002Fdiv>\n  <div style=\"position:relative;z-index:2;width:100%;max-width:1200px;margin:0 auto;padding:96px clamp(20px,5vw,64px) 0\">\n    <div style=\"max-width:700px\">\n      <div style=\"font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(241,238,230,.55);margin-bottom:clamp(26px,3vw,38px);display:flex;align-items:center;gap:13px;animation:mnUp .9s cubic-bezier(.2,.7,.2,1) .28s both\">\n        <span style=\"width:6px;height:6px;border-radius:50%;background:{{ acc }}\"><\u002Fspan> Sovereign intelligence\n      <\u002Fdiv>\n      <h1 style=\"font-family:'Geist',sans-serif;font-weight:600;font-size:clamp(36px,4.8vw,60px);line-height:1.08;letter-spacing:-.03em;color:#F1EEE6\">\n        <span style=\"display:block;overflow:hidden;padding-bottom:.06em\"><span style=\"display:block;animation:mnRise 1.05s cubic-bezier(.16,.82,.24,1) .5s both\">Not the AI that knows the world.<\u002Fspan><\u002Fspan>\n        <span style=\"display:block;overflow:hidden;padding-bottom:.06em\"><span style=\"display:block;color:#EADFC7;animation:mnRise 1.05s cubic-bezier(.16,.82,.24,1) .68s both\">The AI that knows yours.<\u002Fspan><\u002Fspan>\n      <\u002Fh1>\n      <p style=\"margin-top:clamp(26px,3vw,34px);max-width:48ch;font-size:clamp(16px,1.7vw,18px);line-height:1.62;color:rgba(241,238,230,.66);animation:mnUp 1s cubic-bezier(.2,.7,.2,1) .95s both\">Sovereign intelligence trained on your domain. Running on hardware you own. Growing sharper every day it operates.<\u002Fp>\n      <div style=\"margin-top:clamp(34px,4vw,44px);display:flex;align-items:center;gap:28px;flex-wrap:wrap;animation:mnUp 1s cubic-bezier(.2,.7,.2,1) 1.12s both\">\n        <a href=\"#industries\" style=\"font-family:'Geist Mono',monospace;font-size:12.5px;letter-spacing:.04em;text-transform:uppercase;text-decoration:none;color:#0C0A07;background:#F1EEE6;border-radius:999px;padding:15px 28px;transition:transform .3s ease,box-shadow .3s ease\" style-hover=\"transform:translateY(-2px);box-shadow:0 16px 34px -16px rgba(241,238,230,.5)\">Explore the intelligence<\u002Fa>\n        <a href=\"#thesis\" style=\"font-family:'Geist Mono',monospace;font-size:12.5px;letter-spacing:.03em;text-transform:uppercase;text-decoration:none;color:#F1EEE6;border-bottom:1px solid rgba(241,238,230,.3);padding-bottom:4px;transition:color .3s,border-color .3s\" style-hover=\"color:#C8A968;border-color:#C8A968\">The thesis →<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:absolute;left:0;right:0;bottom:0;z-index:2;background:rgba(12,10,7,.48);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-top:1px solid rgba(241,238,230,.1)\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:16px clamp(20px,5vw,64px);display:flex;gap:clamp(18px,4vw,44px);align-items:center;flex-wrap:wrap;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:rgba(241,238,230,.5);animation:mnUp 1.1s cubic-bezier(.2,.7,.2,1) 1.35s both\">\n      <span>Offline<\u002Fspan><span style=\"width:4px;height:4px;border-radius:50%;background:rgba(241,238,230,.25)\"><\u002Fspan>\n      <span>On your hardware<\u002Fspan><span style=\"width:4px;height:4px;border-radius:50%;background:rgba(241,238,230,.25)\"><\u002Fspan>\n      <span>Seventeen registered models<\u002Fspan>\n      <span style=\"margin-left:auto;font-family:'Amiri',serif;font-size:16px;letter-spacing:0;color:rgba(241,238,230,.5)\" dir=\"rtl\">منارة في الظلام<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ===================== THESIS ===================== -->\n<section id=\"thesis\" style=\"padding:clamp(48px,4.5vw,72px) 0\">\n  <div style=\"max-width:1200px;margin:0 auto;padding:0 clamp(20px,5vw,64px)\">\n    <div data-rv=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity 1s cubic-bezier(.2,.7,.2,1),transform 1s cubic-bezier(.2,.7,.2,1);display:flex;align-items:center;gap:14px;margin-bottom:clamp(28px,3vw,44px)\">\n      <span style=\"font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.1em;color:#A6884E\">01<\u002Fspan>\n      <span style=\"width:26px;height:1px;background:rgba(22,19,13,.28)\"><\u002Fspan>\n      <span style=\"font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8A8377\">What we do<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,360px),1fr));gap:clamp(36px,5vw,76px);align-items:start\">\n      <div>\n        <p data-rv=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity 1s cubic-bezier(.2,.7,.2,1) .05s,transform 1s cubic-bezier(.2,.7,.2,1) .05s;font-family:'Geist',sans-serif;font-weight:400;font-size:clamp(18px,1.6vw,22px);line-height:1.5;letter-spacing:-.012em;color:#16130D\">Every organization sits on data it has never read. Policies no one has time to search. Cameras no one has time to watch. The data is there. It sits unused.<br><br>Manar reads it. We train a registered model on your specific conditions, install it on hardware you own, and let it grow sharper every day it operates. The intelligence never leaves your walls.<br><br><span style=\"color:#A6884E\">Your data. Your walls. Your intelligence.<\u002Fspan><\u002Fp>\n        <div data-rv=\"\" style=\"opacity:0;transform:translateY(18px);transition:opacity .9s cubic-bezier(.2,.7,.2,1) .12s,transform .9s cubic-bezier(.2,.7,.2,1) .12s;margin-top:clamp(26px,2.8vw,38px)\">\n          <div style=\"height:1px;background:rgba(22,19,13,.11);margin-bottom:clamp(18px,2vw,26px)\"><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:16px\">\n            <div style=\"display:flex;align-items:flex-start;gap:14px\">\n              <span style=\"font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.1em;color:#A6884E;flex:0 0 auto;padding-top:4px\">01<\u002Fspan>\n              <span style=\"font-size:15px;line-height:1.58;color:#59544A\">Train a registered model on the data your operation already produces.<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:flex-start;gap:14px\">\n              <span style=\"font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.1em;color:#A6884E;flex:0 0 auto;padding-top:4px\">02<\u002Fspan>\n              <span style=\"font-size:15px;line-height:1.58;color:#59544A\">Install it on hardware you own, inside your walls, offline if required.<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex;align-items:flex-start;gap:14px\">\n              <span style=\"font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.1em;color:#A6884E;flex:0 0 auto;padding-top:4px\">03<\u002Fspan>\n              <span style=\"font-size:15px;line-height:1.58;color:#59544A\">Keep it current as your operation grows, compounding sharper with every day it runs.<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column\">\n        <div data-rv=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .9s cubic-bezier(.2,.7,.2,1) .1s,transform .9s cubic-bezier(.2,.7,.2,1) .1s;padding:22px 0;border-top:1px solid rgba(22,19,13,.14)\">\n          <div style=\"font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#A6884E;margin-bottom:11px\">The premise<\u002Fdiv>\n          <div style=\"font-size:16px;line-height:1.62;color:#59544A\">Generic AI is available to everyone, which is precisely why it is the advantage of no one. The advantage is sovereign intelligence, trained on your conditions alone, running offline on hardware you control.<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-rv=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .9s cubic-bezier(.2,.7,.2,1) .16s,transform .9s cubic-bezier(.2,.7,.2,1) .16s;padding:22px 0;border-top:1px solid rgba(22,19,13,.14)\">\n          <div style=\"font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#A6884E;margin-bottom:11px\">The approach<\u002Fdiv>\n          <div style=\"font-size:16px;line-height:1.62;color:#59544A\">Built to extend. A new kind of work gets a model trained for it, not a system rebuilt from nothing. What it learns about your operation stays with you.<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-rv=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .9s cubic-bezier(.2,.7,.2,1) .22s,transform .9s cubic-bezier(.2,.7,.2,1) .22s;padding:22px 0;border-top:1px solid rgba(22,19,13,.14);border-bottom:1px solid rgba(22,19,13,.14)\">\n          <div style=\"font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#A6884E;margin-bottom:11px\">The company<\u002Fdiv>\n          <div style=\"font-size:16px;line-height:1.62;color:#59544A\">Manar trains and deploys registered models, on hardware sized to what each one does, inside your environment. One method. Seventeen models. Built to grow.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== INDUSTRIES (picker) ===================== -->\n<section id=\"industries\" style=\"padding:clamp(48px,4.5vw,72px) 0;background:#ECE7DB\">\n  <div style=\"max-width:1200px;margin:0 auto;padding:0 clamp(20px,5vw,64px)\">\n    <div data-rv=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity 1s cubic-bezier(.2,.7,.2,1),transform 1s cubic-bezier(.2,.7,.2,1);max-width:640px;margin-bottom:clamp(24px,2.4vw,36px)\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:22px\">\n        <span style=\"font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.1em;color:#A6884E\">02<\u002Fspan>\n        <span style=\"width:26px;height:1px;background:rgba(22,19,13,.28)\"><\u002Fspan>\n        <span style=\"font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8A8377\">Where it fits<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Geist',sans-serif;font-weight:600;font-size:clamp(26px,3.2vw,40px);line-height:1.14;letter-spacing:-.026em;color:#16130D\">Built for what you actually run. <span style=\"color:#59544A\">Not the world in general.<\u002Fspan><\u002Fh2>\n      <p style=\"margin-top:18px;font-size:16px;line-height:1.62;color:#59544A;max-width:56ch\">Manar maintains seventeen registered models across six families. Choose the sector you run, and see which models read its data, where they show up, and how a deployment begins on your ground.<\u002Fp>\n    <\u002Fdiv>\n    <div data-rv=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity 1s cubic-bezier(.2,.7,.2,1),transform 1s cubic-bezier(.2,.7,.2,1)\">\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,158px),1fr));gap:9px\">\n        <sc-for list=\"{{ cards }}\" as=\"c\" hint-placeholder-count=\"8\">\n          <div onclick=\"{{ c.onClick }}\" style=\"position:relative;cursor:pointer;padding:16px 15px 14px;border:1px solid {{ c.border }};border-left:3px solid {{ c.dot }};border-radius:10px;background:{{ c.bg }};box-shadow:{{ c.shadow }};transition:border-color .25s,background .25s,transform .25s,box-shadow .25s\" style-hover=\"transform:translateY(-3px);box-shadow:0 16px 32px -20px rgba(12,10,7,.45)\">\n            <div style=\"font-family:'Geist';font-weight:600;font-size:14px;letter-spacing:-.01em;line-height:1.2;color:{{ c.fg }};margin-bottom:5px\">{{ c.name }}<\u002Fdiv>\n            <div style=\"font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.01em;color:{{ c.sc }}\">{{ c.sub }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div data-ind-detail=\"\" style=\"margin-top:14px;background:#FBFAF6;box-shadow:0 1px 2px rgba(22,19,13,.04),0 14px 36px -24px rgba(22,19,13,.2);border:1px solid rgba(22,19,13,.13);border-radius:14px;padding:clamp(28px,3.4vw,42px) clamp(24px,3.4vw,42px)\">\n        <div style=\"display:flex;justify-content:space-between;align-items:flex-start;gap:clamp(18px,3vw,40px);flex-wrap:wrap;margin-bottom:clamp(22px,2.6vw,30px)\">\n          <div style=\"max-width:54ch\">\n            <div style=\"font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#A6884E;margin-bottom:12px\">Your sector<\u002Fdiv>\n            <div style=\"font-family:'Geist',sans-serif;font-weight:600;font-size:clamp(23px,2.8vw,32px);line-height:1.08;letter-spacing:-.024em;color:#16130D\">{{ curName }}<\u002Fdiv>\n            <p style=\"margin-top:12px;font-size:15.5px;line-height:1.55;color:#59544A\">{{ frame }}<\u002Fp>\n          <\u002Fdiv>\n          <div style=\"text-align:right;flex:0 0 auto\">\n            <div style=\"font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:#A6884E;margin-bottom:7px\">What it reads<\u002Fdiv>\n            <div style=\"font-family:'Geist',sans-serif;font-size:15px;letter-spacing:-.006em;color:#16130D\">{{ reads }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"height:1px;background:rgba(22,19,13,.1);margin-bottom:clamp(22px,2.6vw,30px)\"><\u002Fdiv>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,330px),1fr));gap:clamp(26px,4vw,56px);align-items:start\">\n          <div>\n            <div style=\"font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#8A8377;margin-bottom:16px\">Where it shows up<\u002Fdiv>\n            <ul style=\"list-style:none;display:flex;flex-direction:column;gap:14px\">\n              <sc-for list=\"{{ items }}\" as=\"it\" hint-placeholder-count=\"4\">\n                <li style=\"position:relative;padding-left:20px;font-size:15px;line-height:1.55;color:#59544A\">\n                  <span style=\"position:absolute;left:0;top:10px;width:8px;height:1.5px;background:#A6884E\"><\u002Fspan>\n                  <b style=\"color:#16130D;font-weight:600\">{{ it.lead }}<\u002Fb> {{ it.rest }}\n                <\u002Fli>\n              <\u002Fsc-for>\n            <\u002Ful>\n          <\u002Fdiv>\n          <div>\n            <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:14px\">\n              <span style=\"font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:#8A8377\">Deployed models<\u002Fspan>\n              <span style=\"font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.04em;color:rgba(22,19,13,.3)\">{{ modelCount }} registered<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"border:1px solid rgba(22,19,13,.09);border-radius:10px;overflow:hidden;background:#fff\">\n              <sc-for list=\"{{ systems }}\" as=\"sy\" hint-placeholder-count=\"3\">\n                <div style=\"display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid rgba(22,19,13,.06);gap:12px\">\n                  <span style=\"font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.03em;font-weight:500;color:#16130D;white-space:nowrap\">{{ sy.code }}<\u002Fspan>\n                  <span style=\"font-family:'Geist',sans-serif;font-size:12.5px;color:#8A8377;text-align:right;white-space:nowrap\">{{ sy.role }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <a href=\"#\" onclick=\"{{ openContactCur }}\" style=\"margin-top:11px;display:flex;align-items:center;justify-content:space-between;gap:14px;text-decoration:none;background:#0C0A07;border-radius:10px;padding:14px 16px;transition:transform .3s ease,box-shadow .3s ease\" style-hover=\"transform:translateY(-2px);box-shadow:0 14px 30px -16px rgba(12,10,7,.55)\">\n              <span style=\"font-family:'Geist',sans-serif;font-size:13.5px;line-height:1.35;color:#F1EEE6\">Deploy <b style=\"font-weight:600;color:#fff\">{{ curName }}<\u002Fb> intelligence on your own hardware.<\u002Fspan>\n              <span style=\"font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:#C8A968;white-space:nowrap\">Start →<\u002Fspan>\n            <\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== INTEGRATION ===================== -->\n<section id=\"integration\" style=\"padding:clamp(48px,4.5vw,72px) 0\">\n  <div style=\"max-width:1200px;margin:0 auto;padding:0 clamp(20px,5vw,64px)\">\n    <div data-rv=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity 1s cubic-bezier(.2,.7,.2,1),transform 1s cubic-bezier(.2,.7,.2,1);max-width:640px;margin-bottom:clamp(24px,2.4vw,36px)\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:22px\">\n        <span style=\"font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.1em;color:#A6884E\">03<\u002Fspan>\n        <span style=\"width:26px;height:1px;background:rgba(22,19,13,.28)\"><\u002Fspan>\n        <span style=\"font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8A8377\">Where it runs<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Geist',sans-serif;font-weight:600;font-size:clamp(26px,3.2vw,40px);line-height:1.14;letter-spacing:-.026em;color:#16130D\">It runs on what you already have. <span style=\"color:#59544A\">On hardware sized to the job.<\u002Fspan><\u002Fh2>\n      <p style=\"margin-top:18px;font-size:16px;line-height:1.6;color:#59544A;max-width:58ch\">A deployment does not rebuild your site around it. The model plugs into the systems you already run, on hardware sized to the job, and works with what they already produce.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:13px\">\n      <div data-rv=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1);background:#FCFBF7;box-shadow:0 1px 2px rgba(22,19,13,.04),0 14px 36px -24px rgba(22,19,13,.2);border:1px solid rgba(22,19,13,.09);border-radius:14px;padding:clamp(26px,2.6vw,34px);display:flex;flex-direction:column\">\n        <div style=\"font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:#A6884E;margin-bottom:18px\">CONNECT<\u002Fdiv>\n        <h3 style=\"font-family:'Geist',sans-serif;font-weight:600;font-size:18px;letter-spacing:-.012em;color:#16130D;margin-bottom:12px\">What you already run<\u002Fh3>\n        <p style=\"font-size:15px;line-height:1.58;color:#59544A;flex:1\">The cameras, machines, records, and software already running at a site. A registered model works with the systems operating today. It does not replace them.<\u002Fp>\n        <div style=\"margin-top:18px;padding-top:15px;border-top:1px solid rgba(22,19,13,.1);font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.04em;color:#8A8377\">Cameras · Machines · Records · Software<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-rv=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .9s cubic-bezier(.2,.7,.2,1) .06s,transform .9s cubic-bezier(.2,.7,.2,1) .06s;background:#FCFBF7;box-shadow:0 1px 2px rgba(22,19,13,.04),0 14px 36px -24px rgba(22,19,13,.2);border:1px solid rgba(22,19,13,.09);border-radius:14px;padding:clamp(26px,2.6vw,34px);display:flex;flex-direction:column\">\n        <div style=\"font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:#A6884E;margin-bottom:18px\">READ<\u002Fdiv>\n        <h3 style=\"font-family:'Geist',sans-serif;font-weight:600;font-size:18px;letter-spacing:-.012em;color:#16130D;margin-bottom:12px\">Live data in place<\u002Fh3>\n        <p style=\"font-size:15px;line-height:1.58;color:#59544A;flex:1\">The model reads data where it already lives. No export, no transfer to a third party, no rebuild of the operation around our software.<\u002Fp>\n        <div style=\"margin-top:18px;padding-top:15px;border-top:1px solid rgba(22,19,13,.1);font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.04em;color:#8A8377\">No export · No transfer · No third-party access<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-rv=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .9s cubic-bezier(.2,.7,.2,1) .12s,transform .9s cubic-bezier(.2,.7,.2,1) .12s;background:#FCFBF7;box-shadow:0 1px 2px rgba(22,19,13,.04),0 14px 36px -24px rgba(22,19,13,.2);border:1px solid rgba(22,19,13,.09);border-radius:14px;padding:clamp(26px,2.6vw,34px);display:flex;flex-direction:column\">\n        <div style=\"font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:#A6884E;margin-bottom:18px\">REASON<\u002Fdiv>\n        <h3 style=\"font-family:'Geist',sans-serif;font-weight:600;font-size:18px;letter-spacing:-.012em;color:#16130D;margin-bottom:12px\">Local intelligence<\u002Fh3>\n        <p style=\"font-size:15px;line-height:1.58;color:#59544A;flex:1\">Reasoning happens on site, on hardware sized to the model deployed there, owned by the client or specified by Manar. Decisions, alerts, and answers delivered where the work happens.<\u002Fp>\n        <div style=\"margin-top:18px;padding-top:15px;border-top:1px solid rgba(22,19,13,.1);font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.04em;color:#8A8377\">On-site hardware · Client-owned · Sized to workload<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-rv=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .9s cubic-bezier(.2,.7,.2,1) .18s,transform .9s cubic-bezier(.2,.7,.2,1) .18s;background:#0C0A07;color:#F1EEE6;box-shadow:0 1px 2px rgba(22,19,13,.04),0 14px 36px -24px rgba(22,19,13,.2);border:1px solid rgba(22,19,13,.09);border-radius:14px;padding:clamp(26px,2.6vw,34px);display:flex;flex-direction:column\">\n        <div style=\"font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.14em;color:#C8A968;margin-bottom:18px\">REMAIN<\u002Fdiv>\n        <h3 style=\"font-family:'Geist',sans-serif;font-weight:600;font-size:18px;letter-spacing:-.012em;color:#F1EEE6;margin-bottom:12px\">Sovereign throughout<\u002Fh3>\n        <p style=\"font-size:15px;line-height:1.58;color:rgba(241,238,230,.66);flex:1\">None of this requires data to leave the building. Integration extends what a model can read. It does not change where the intelligence runs or who owns it.<\u002Fp>\n        <div style=\"margin-top:18px;padding-top:15px;border-top:1px solid rgba(241,238,230,.1);font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.04em;color:rgba(241,238,230,.4)\">Data stays inside · Sovereign from day one<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== PARTNERS ===================== -->\n<section id=\"partners\" style=\"padding:clamp(48px,4.5vw,72px) 0;background:#ECE7DB\">\n  <div style=\"max-width:1200px;margin:0 auto;padding:0 clamp(20px,5vw,64px)\">\n    <div data-rv=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity 1s cubic-bezier(.2,.7,.2,1),transform 1s cubic-bezier(.2,.7,.2,1);max-width:640px;margin-bottom:clamp(24px,2.4vw,36px)\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:22px\">\n        <span style=\"font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.1em;color:#A6884E\">04<\u002Fspan>\n        <span style=\"width:26px;height:1px;background:rgba(22,19,13,.28)\"><\u002Fspan>\n        <span style=\"font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8A8377\">How we reach further<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Geist',sans-serif;font-weight:600;font-size:clamp(26px,3.2vw,40px);line-height:1.14;letter-spacing:-.026em;color:#16130D\">Three ways in. <span style=\"color:#59544A\">Your data never moves.<\u002Fspan><\u002Fh2>\n      <p style=\"margin-top:18px;font-size:16px;line-height:1.6;color:#59544A;max-width:58ch\">A partner often already has the infrastructure, the install base, or the software a client uses every day. Manar trains the model behind it. However a deployment starts, the client's data stays in their building.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:13px\">\n      <div data-rv=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1);background:#FCFBF7;box-shadow:0 1px 2px rgba(22,19,13,.04),0 14px 36px -24px rgba(22,19,13,.2);border:1px solid rgba(22,19,13,.09);border-radius:14px;padding:clamp(26px,2.6vw,34px);display:flex;flex-direction:column\">\n        <div style=\"font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#A6884E;margin-bottom:18px\">Direct<\u002Fdiv>\n        <h3 style=\"font-family:'Geist',sans-serif;font-weight:600;font-size:18px;line-height:1.22;letter-spacing:-.012em;min-height:44px;color:#16130D;margin-bottom:12px\">We install it ourselves<\u002Fh3>\n        <p style=\"font-size:15px;line-height:1.58;color:#59544A;flex:1\">Manar trains the model, ships it, and installs it inside the client's environment. We hold the relationship from the first conversation to ongoing support.<\u002Fp>\n        <div style=\"margin-top:18px;padding-top:15px;border-top:1px solid rgba(22,19,13,.1);font-size:13px;line-height:1.5;color:#8A8377\"><b style=\"color:#59544A;font-weight:500\">Example ·<\u002Fb> <b style=\"color:#16130D\">A school or government office<\u002Fb> we approach directly, with no existing vendor already in the room.<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-rv=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .9s cubic-bezier(.2,.7,.2,1) .07s,transform .9s cubic-bezier(.2,.7,.2,1) .07s;background:#FCFBF7;box-shadow:0 1px 2px rgba(22,19,13,.04),0 14px 36px -24px rgba(22,19,13,.2);border:1px solid rgba(22,19,13,.09);border-radius:14px;padding:clamp(26px,2.6vw,34px);display:flex;flex-direction:column\">\n        <div style=\"font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#A6884E;margin-bottom:18px\">Through an installer<\u002Fdiv>\n        <h3 style=\"font-family:'Geist',sans-serif;font-weight:600;font-size:18px;line-height:1.22;letter-spacing:-.012em;min-height:44px;color:#16130D;margin-bottom:12px\">They already hold the relationship<\u002Fh3>\n        <p style=\"font-size:15px;line-height:1.58;color:#59544A;flex:1\">A systems integrator or distributor already sells and maintains the hardware a client runs. Manar trains the model for that hardware. They keep the client and the install. We keep the model.<\u002Fp>\n        <div style=\"margin-top:18px;padding-top:15px;border-top:1px solid rgba(22,19,13,.1);font-size:13px;line-height:1.5;color:#8A8377\"><b style=\"color:#59544A;font-weight:500\">Example ·<\u002Fb> <b style=\"color:#16130D\">A CCTV or security integrator<\u002Fb> on a factory floor, now selling Simah as the intelligence layer on cameras they already maintain.<\u002Fdiv>\n      <\u002Fdiv>\n      <div data-rv=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .9s cubic-bezier(.2,.7,.2,1) .14s,transform .9s cubic-bezier(.2,.7,.2,1) .14s;background:#FCFBF7;box-shadow:0 1px 2px rgba(22,19,13,.04),0 14px 36px -24px rgba(22,19,13,.2);border:1px solid rgba(22,19,13,.09);border-radius:14px;padding:clamp(26px,2.6vw,34px);display:flex;flex-direction:column\">\n        <div style=\"font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#A6884E;margin-bottom:18px\">Inside their product<\u002Fdiv>\n        <h3 style=\"font-family:'Geist',sans-serif;font-weight:600;font-size:18px;line-height:1.22;letter-spacing:-.012em;min-height:44px;color:#16130D;margin-bottom:12px\">They already hold the software<\u002Fh3>\n        <p style=\"font-size:15px;line-height:1.58;color:#59544A;flex:1\">A partner's existing software calls the model as a feature inside their own product. Their customers see the partner's interface, not ours. We supply and train the model behind it.<\u002Fp>\n        <div style=\"margin-top:18px;padding-top:15px;border-top:1px solid rgba(22,19,13,.1);font-size:13px;line-height:1.5;color:#8A8377\"><b style=\"color:#59544A;font-weight:500\">Example ·<\u002Fb> <b style=\"color:#16130D\">A school or hospital records platform<\u002Fb> a client already runs, adding document search or imaging support as a feature inside it.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== HOW WE WORK ===================== -->\n<section id=\"work\" style=\"padding:clamp(48px,4.5vw,72px) 0\">\n  <div style=\"max-width:1200px;margin:0 auto;padding:0 clamp(20px,5vw,64px)\">\n    <div data-rv=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity 1s cubic-bezier(.2,.7,.2,1),transform 1s cubic-bezier(.2,.7,.2,1);max-width:640px;margin-bottom:clamp(24px,2.4vw,36px)\">\n      <div style=\"display:flex;align-items:center;gap:14px;margin-bottom:22px\">\n        <span style=\"font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.1em;color:#A6884E\">05<\u002Fspan>\n        <span style=\"width:26px;height:1px;background:rgba(22,19,13,.28)\"><\u002Fspan>\n        <span style=\"font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#8A8377\">How we work<\u002Fspan>\n      <\u002Fdiv>\n      <h2 style=\"font-family:'Geist',sans-serif;font-weight:600;font-size:clamp(26px,3.2vw,40px);line-height:1.14;letter-spacing:-.026em;color:#16130D\">From the registry. <span style=\"color:#59544A\">Onto your ground.<\u002Fspan><\u002Fh2>\n      <p style=\"margin-top:18px;font-size:16px;line-height:1.6;color:#59544A;max-width:58ch\">A deployment starts with one of the registered models. It gets trained on your data, installed on your hardware, and kept current as your operation changes.<\u002Fp>\n    <\u002Fdiv>\n    <div data-rv=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity .9s cubic-bezier(.2,.7,.2,1),transform .9s cubic-bezier(.2,.7,.2,1);background:#FCFBF7;box-shadow:0 1px 2px rgba(22,19,13,.04),0 14px 36px -24px rgba(22,19,13,.2);border:1px solid rgba(22,19,13,.09);border-radius:14px;padding:clamp(34px,4vw,48px) clamp(24px,3vw,42px)\">\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:0\">\n        <div style=\"padding-right:clamp(16px,2vw,28px);border-right:1px solid rgba(22,19,13,.08)\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:18px\">\n            <span style=\"display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;border:1.5px solid #A6884E;font-family:'Geist Mono',monospace;font-size:12px;font-weight:500;color:#A6884E\">1<\u002Fspan>\n            <span style=\"font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#A6884E\">Train<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:15px;line-height:1.58;color:#59544A;margin-bottom:18px\">Start from a registered model already built for the classification a client needs. Train it further on their own data until it knows their specific conditions.<\u002Fp>\n          <div style=\"padding-top:15px;border-top:1px solid rgba(22,19,13,.1);font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.04em;color:#8A8377\"><b style=\"color:#16130D;font-weight:600\">SIMAH-SECURITY-VT<\u002Fb> retrained on a site’s own camera footage.<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:0 clamp(16px,2vw,28px);border-right:1px solid rgba(22,19,13,.08)\">\n          <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:18px\">\n            <span style=\"display:flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;border:1.5px solid #A6884E;font-family:'Geist Mono',monospace;font-size:12px;font-weight:500;color:#A6884E\">2<\u002Fspan>\n            <span style=\"font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#A6884E\">Deploy<\u002Fspan>\n          <\u002Fdiv>\n          <p style=  #A6884E;font-family:'Geist Mono',monospace;font-size:12px;font-weight:500;color:#A6884E\">4<\u002Fspan>\n            <span style=\"font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:#A6884E\">Compound<\u002Fspan>\n          <\u002Fdiv>\n          <p style=\"font-size:15px;line-height:1.58;color:#59544A;margin-bottom:18px\">Accuracy on a client’s own conditions grows with every day the model runs there. The organization that started earlier holds a record no later competitor can shortcut.<\u002Fp>\n          <div style=\"padding-top:15px;border-top:1px solid rgba(22,19,13,.1);font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.04em;color:#8A8377\">Two years of scans inside <b style=\"color:#16130D;font-weight:600\">SIMAH-HEALTH-CDS<\u002Fb>, a record no vendor can replicate.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ===================== MANIFESTO ===================== -->\n<section style=\"background:#0C0A07;color:#F1EEE6;text-align:center;padding:clamp(58px,6vw,86px) 0;position:relative;overflow:hidden\">\n  <div style=\"position:absolute;top:-30%;left:50%;width:680px;height:680px;transform:translateX(-50%);border-radius:50%;background:radial-gradient(circle,rgba(201,169,104,.13),transparent 64%);pointer-events:none\"><\u002Fdiv>\n  <div style=\"max-width:1200px;margin:0 auto;padding:0 clamp(20px,5vw,64px);position:relative\">\n    <h2 data-rv=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity 1.1s cubic-bezier(.2,.7,.2,1),transform 1.1s cubic-bezier(.2,.7,.2,1);font-family:'Geist',sans-serif;font-weight:600;font-size:clamp(28px,3.8vw,46px);line-height:1.14;letter-spacing:-.028em;color:#F1EEE6;max-width:17ch;margin:0 auto\">Your data. Your walls. <span style=\"color:#C8A968\">Your intelligence.<\u002Fspan><\u002Fh2>\n    <p data-rv=\"\" style=\"opacity:0;transform:translateY(20px);transition:opacity 1.1s cubic-bezie s & land','Clinics & health','Your operation','Other'];\n\n  openContact(ind) {\n    this.setState({ contactOpen: true, cSubmitted: false, cError: '', cIndustry: ind || this.state.cIndustry });\n    try { document.documentElement.style.overflow = 'hidden'; } catch (e) {}\n  }\n  closeContact() {\n    this.setState({ contactOpen: false });\n    try { document.documentElement.style.overflow = ''; } catch (e) {}\n  }\n  setC(k) { return (e) => this.setState({ [k]: e.target.value, cError: '' }); }\n  submitContact(e) {\n    if (e && e.preventDefault) e.preventDefault();\n    const n = (this.state.cName || '').trim(), em = (this.state.cEmail || '').trim(), nu = (this.state.cNumber || '').trim();\n    if (!n || !em || !nu) { this.setState({ cError: 'Please add your name, email, and number.' }); return; }\n    if (!/^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$/.test(em)) { this.setState({ cError: 'Please enter a valid email address.' }); return; }\n    this.setState({ cSubmitted: true, cError: '' });\n  }\n  resetContact() { this.setState({ cName: '', cEmail: '', cNumber: '', cCompany: '', cComment: '', cSubmitted: false, cError: '' }); }\n\n  data() {\n    return [\n      { name:'Institutions', sub:'schools, colleges, govt offices, finance, legal', reads:'documents, records, archives, Urdu and English', frame:'Years of files, notifications, and records that no one has the hours to read.',\n        systems:[ { code:'SIJILL-KNOWLEDGE-RAG', name:'Sijill', role:'Documents and records' }, { code:'SIJILL-EDUCATION-MT', name:'Sijill', role:'Teaching and curricula' } ],\n        items:[\n          'Schools and colleges. Search board policy, past papers, and student records across Urdu and English in one query.',\n          'Government offices. Find the right notification or circular across years of archived files, with the source cited.',\n          'Finance and legal teams. Pull the exact clause from a contract or SRO on file, without reading the whole document.',\n          'HR and administration. Answer a staff query at once, sourced from the actual service rules.'\n        ]},\n      { name:'Security & retail', sub:'retail stores, warehouses, plants, facilities', reads:'cameras, thermal feeds, access logs', frame:'Cameras already running on every floor, watched closely by no one.',\n        systems:[ { code:'SIMAH-SECURITY-VT', name:'Simah', role:'Sites and perimeters' }, { code:'SIMAH-QUALITY-VT', name:'Simah', role:'Line defects' }, { code:'SIMAH-SAFETY-VT', name:'Simah', role:'Compliance and safety' } ],\n        items:[\n          'Retail and wholesale. Flag a theft pattern or an empty shelf from the cameras already installed.',\n          'Production floors. Catch a packaging or stitching defect the moment it appears, before the lot ships.',\n          'Plants and offices. Notice an unrecognised face at a gate without a guard watching every feed.'\n        ]},\n      { name:'Factories', sub:'textiles, sportswear, pharma, FMCG, leather', reads:'visual, thermal, machine telemetry', frame:'A Faisalabad textile or Sialkot sports-goods floor producing more data than anyone reviews.',\n        systems:[ { code:'SIMAH-QUALITY-VT', name:'Simah', role:'Line defects' }, { code:'SIMAH-SAFETY-VT', name:'Simah', role:'Compliance and safety' }, { code:'TANIN-INDUSTRY-TS', name:'Tanin', role:'Machine health' }, { code:'TANIN-PIPELINE-NPW', name:'Tanin', role:'Flow and pressure' }, { code:'WAKIL-LOGISTICS-AGT', name:'Wakil', role:'Supply chain' } ],\n        items:[\n          'Quality control. Read a stitching or weave line for defects as they appear, not after the lot is packed.',\n          'Safety compliance. Flag a missed mask, glove, or restricted-zone entry before it becomes an incident.',\n          'Machine data. Combine camera footage with the floor\\u2019s own sensor readings into one picture of the shift.',\n          'Supply and dispatch. Track materials and outbound shipments against the production schedule.'\n        ]},\n      { name:'Warehouses', sub:'FMCG, cold storage, logistics hubs', reads:'visual, access logs, dispatch records', frame:'A distribution hub where stock and access are still reconciled on paper.',\n        systems:[ { code:'SIMAH-SECURITY-VT', name:'Simah', role:'Sites and perimeters' }, { code:'SIJILL-KNOWLEDGE-RAG', name:'Sijill', role:'Documents and records' }, { code:'WAKIL-LOGISTICS-AGT', name:'Wakil', role:'Logistics dispatch' }, { code:'TANIN-BUILDING-TS', name:'Tanin', role:'Building systems' } ],\n        items:[\n          'Inventory. Verify stock against dispatch records without a manual count.',\n          'Access control. Track who entered which bay and when, from logs already kept.',\n          'Movement. Follow goods through the building using the systems already running.',\n          'Building ops. Monitor HVAC, loading docks, and facility telemetry from one feed.'\n        ]},\n      { name:'Cold chain', sub:'pharma, dairy, mango export, horticulture', reads:'environmental sensors, dispatch data', frame:'A pharma or mango-export chain where a single excursion spoils the whole consignment.',\n        systems:[ { code:'TANIN-PIPELINE-NPW', name:'Tanin', role:'Pressure and cold chain' }, { code:'UFUQ-CLIMATE-GEO', name:'Ufuq', role:'Climate risk' }, { code:'SIJILL-KNOWLEDGE-RAG', name:'Sijill', role:'Audit and compliance' } ],\n        items:[\n          'Spoilage. Catch a temperature drift before a consignment is lost, from sensors already installed.',\n          'Excursions. Flag a humidity or cold-room breach the moment it happens, not at the next manual check.',\n          'Audit. Hold a complete record of the chain for the buyer or regulator who asks for it.'\n        ]},\n      { name:'Farms & land', sub:'cotton, wheat, mango orchards, rice', reads:'farm records, imagery, weather', frame:'A cotton holding or mango orchard with decades of yield sitting in a register.',\n        systems:[ { code:'HISAD-AGRICULTURE-RA', name:'Hisad', role:'Farm advisory' }, { code:'HISAD-AGRICULTURE-EO', name:'Hisad', role:'Earth observation' }, { code:'UFUQ-CLIMATE-GEO', name:'Ufuq', role:'Climate risk' }, { code:'UFUQ-ENVIRONMENT-SAT', name:'Ufuq', role:'Environmental monitoring' } ],\n        items:[\n          'Crop planning. Decide from the holding\\u2019s own record of what was sown and how each field performed.',\n          'Soil and water. Track usage against the property\\u2019s actual history, not a provincial average.',\n          'Imagery. Layer in satellite or drone imagery as it becomes available, on the same record.',\n          'Climate. Assess seasonal risk from environmental data tied to the actual plot.'\n        ]},\n      { name:'Clinics & health', sub:'diagnostic labs, hospitals, imaging centers', reads:'imaging, patient records', frame:'A diagnostic lab or teaching hospital sitting on years of its own scans.',\n        systems:[ { code:'SIMAH-HEALTH-CDS', name:'Simah', role:'Clinical imaging' }, { code:'SIJILL-KNOWLEDGE-RAG', name:'Sijill', role:'Patient records' } ],\n        items:[\n          'Imaging review. Support a scan reading alongside the radiologist, never in place of one.',\n          'Patient records. Surface a relevant pattern from the facility\\u2019s own history on request.',\n          'Reporting. Draft a first-pass report for the clinician to check and sign.'\n        ]},\n      { name:'Your operation', sub:'transport, utilities, banking, ports', reads:'your existing systems', frame:'Whatever you run, if the data exists, a model can be trained on it, on your ground.',\n        systems:[ { code:'HIKMA-OPERATION-STF', name:'Hikma', role:'Scoped to your work' }, { code:'WAKIL-PLATFORM-AGT', name:'Wakil', role:'Commerce platforms' } ],\n        items:[\n          'Transport, banking back-offices, utilities, or anything else you operate. If the data and the systems are in place, a model is trained on your operation specifically.'\n        ]}\n    ];\n  }\n\n  pick(i) {\n    const wasSel = this.state.sel;\n    this
